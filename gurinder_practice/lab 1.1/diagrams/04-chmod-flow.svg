<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 200" role="img" aria-label="chmod permission flow">
  <defs>
    <marker id="chmodArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="740" height="200" rx="14" fill="#F8FAFC"/>
  <text x="370" y="28" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="14" font-weight="700" fill="#0F172A">Linux File Permissions — chmod +x</text>
  <circle cx="95" cy="78" r="18" fill="#F59E0B"/>
  <text x="95" y="83" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="13" font-weight="700" fill="#FFFFFF">1</text>
  <rect x="30" y="108" width="130" height="72" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="95" y="132" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="600" fill="#92400E">hello.sh</text>
  <text x="95" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#78350F">-rw-r--r--</text>
  <text x="95" y="168" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">not executable</text>
  <line x1="160" y1="132" x2="195" y2="132" stroke="#334155" stroke-width="2" marker-end="url(#chmodArrow)"/>
  <circle cx="250" cy="132" r="18" fill="#2563EB"/>
  <text x="250" y="137" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="13" font-weight="700" fill="#FFFFFF">2</text>
  <text x="250" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#1E40AF">chmod +x</text>
  <line x1="310" y1="132" x2="305" y2="132" stroke="#334155" stroke-width="2" marker-end="url(#chmodArrow)"/>
  <circle cx="360" cy="132" r="18" fill="#16A34A"/>
  <text x="360" y="137" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="13" font-weight="700" fill="#FFFFFF">3</text>
  <rect x="295" y="108" width="130" height="72" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="360" y="132" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="600" fill="#166534">hello.sh</text>
  <text x="360" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#15803D">-rwxr-xr-x</text>
  <line x1="425" y1="132" x2="460" y2="132" stroke="#334155" stroke-width="2" marker-end="url(#chmodArrow)"/>
  <circle cx="515" cy="132" r="18" fill="#7C3AED"/>
  <text x="515" y="137" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="13" font-weight="700" fill="#FFFFFF">4</text>
  <rect x="450" y="108" width="130" height="72" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="515" y="132" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="600" fill="#1E40AF">./hello.sh</text>
  <text x="515" y="156" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" fill="#334155">Hello SOC</text>
  <rect x="30" y="178" width="680" height="18" rx="4" fill="#EFF6FF"/>
  <text x="370" y="190" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">r=read · w=write · x=execute · chmod = change mode</text>
</svg>