<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" role="img" aria-label="chmod permission flow">
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="780" height="220" fill="#F8FAFC"/>
  <text x="390" y="32" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="18" font-weight="700" fill="#0F172A">chmod +x</text>
  <text x="390" y="52" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Make a script executable, then run it</text>

  <rect x="40" y="88" width="90" height="64" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="85" y="114" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#92400E">hello.sh</text>
  <text x="85" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#78350F">-rw-r--r--</text>

  <line x1="130" y1="120" x2="158" y2="120" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="144" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#2563EB">chmod +x</text>

  <rect x="158" y="88" width="90" height="64" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="203" y="114" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#166534">hello.sh</text>
  <text x="203" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#15803D">-rwxr-xr-x</text>

  <line x1="248" y1="120" x2="276" y2="120" stroke="#475569" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="262" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#7C3AED">./hello.sh</text>

  <rect x="276" y="88" width="90" height="64" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="321" y="122" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#1E40AF">Hello SOC</text>

  <rect x="420" y="88" width="320" height="64" rx="8" fill="#FFF" stroke="#E2E8F0"/>
  <text x="440" y="112" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">r = read</text>
  <text x="440" y="132" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">w = write</text>
  <text x="530" y="112" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">x = execute</text>
  <text x="530" y="132" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">+x adds run permission</text>
</svg>
