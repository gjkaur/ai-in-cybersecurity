<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-label="chmod permission flow">
  <defs>
    <marker id="ca" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8Z" fill="#475569"/></marker>
  </defs>
  <rect width="820" height="260" fill="#F8FAFC"/>
  <text x="410" y="32" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="18" font-weight="700" fill="#0F172A">Linux Permissions — chmod +x</text>
  <text x="410" y="52" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Make a script executable, then run it</text>

  <circle cx="90" cy="110" r="20" fill="#F59E0B"/><text x="90" y="116" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">1</text>
  <rect x="40" y="140" width="100" height="70" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="90" y="168" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#92400E">hello.sh</text>
  <text x="90" y="188" text-anchor="middle" font-family="monospace" font-size="11" fill="#78350F">-rw-r--r--</text>

  <line x1="140" y1="175" x2="175" y2="175" stroke="#475569" stroke-width="2" marker-end="url(#ca)"/>
  <circle cx="210" cy="175" r="20" fill="#2563EB"/><text x="210" y="181" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">2</text>
  <text x="210" y="210" text-anchor="middle" font-family="monospace" font-size="12" fill="#1E40AF">chmod +x</text>

  <line x1="230" y1="175" x2="265" y2="175" stroke="#475569" stroke-width="2" marker-end="url(#ca)"/>
  <circle cx="300" cy="175" r="20" fill="#16A34A"/><text x="300" y="181" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">3</text>
  <rect x="250" y="140" width="100" height="70" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="300" y="168" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#166534">hello.sh</text>
  <text x="300" y="188" text-anchor="middle" font-family="monospace" font-size="11" fill="#15803D">-rwxr-xr-x</text>

  <line x1="350" y1="175" x2="385" y2="175" stroke="#475569" stroke-width="2" marker-end="url(#ca)"/>
  <circle cx="420" cy="175" r="20" fill="#7C3AED"/><text x="420" y="181" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">4</text>
  <rect x="370" y="140" width="100" height="70" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="420" y="168" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#1E40AF">./hello.sh</text>
  <text x="420" y="188" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#334155">Hello SOC</text>

  <rect x="520" y="130" width="260" height="90" rx="10" fill="#FFF" stroke="#E2E8F0"/>
  <text x="650" y="152" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#334155">Permission bits (rwx)</text>
  <text x="560" y="172" font-family="monospace" font-size="11" fill="#64748B">owner</text>
  <text x="620" y="172" font-family="monospace" font-size="11" fill="#64748B">group</text>
  <text x="680" y="172" font-family="monospace" font-size="11" fill="#64748B">other</text>
  <rect x="548" y="180" width="52" height="22" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="574" y="195" text-anchor="middle" font-family="monospace" font-size="10" fill="#92400E">rw-</text>
  <rect x="608" y="180" width="52" height="22" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="634" y="195" text-anchor="middle" font-family="monospace" font-size="10" fill="#92400E">r--</text>
  <rect x="668" y="180" width="52" height="22" rx="4" fill="#DCFCE7" stroke="#22C55E"/>
  <text x="694" y="195" text-anchor="middle" font-family="monospace" font-size="10" fill="#166534">r-x</text>
  <text x="650" y="218" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">chmod +x adds execute (x) for all</text>

  <rect x="40" y="236" width="740" height="20" rx="4" fill="#EFF6FF"/>
  <text x="410" y="250" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">chmod = change mode · only executable files can run with ./hello.sh</text>
</svg>
