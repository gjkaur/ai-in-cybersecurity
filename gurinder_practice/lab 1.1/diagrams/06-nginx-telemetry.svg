<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" role="img" aria-label="nginx telemetry flow">
  <defs>
    <marker id="ngxArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="820" height="220" rx="14" fill="#F8FAFC"/>
  <text x="410" y="32" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="15" font-weight="700" fill="#0F172A">HTTP Request to Telemetry Pipeline</text>
  <circle cx="95" cy="110" r="22" fill="#2563EB"/>
  <text x="95" y="115" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <rect x="40" y="148" width="110" height="52" rx="8" fill="#DBEAFE" stroke="#2563EB"/>
  <text x="95" y="172" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="600" fill="#1E40AF">Browser / curl</text>
  <text x="95" y="188" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">HTTP GET /</text>
  <line x1="150" y1="110" x2="195" y2="110" stroke="#334155" stroke-width="2" marker-end="url(#ngxArrow)"/>
  <circle cx="265" cy="110" r="22" fill="#D97706"/>
  <text x="265" y="115" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <rect x="210" y="148" width="110" height="52" rx="8" fill="#FFGapic" stroke="#F59E0B"/>
  <text x="265" y="172" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="600" fill="#92400E">nginx :80</text>
  <text x="265" y="188" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#78350F">serves HTML</text>
  <line x1="320" y1="110" x2="365" y2="110" stroke="#334155" stroke-width="2" marker-end="url(#ngxArrow)"/>
  <circle cx="410" cy="110" r="22" fill="#64748B"/>
  <text x="410" y="115" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <rect x="345" y="148" width="130" height="52" rx="8" fill="#F1F5F9" stroke="#64748B"/>
  <text x="410" y="172" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="600" fill="#334155">access.log</text>
  <text x="410" y="188" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">one line / request</text>
  <line x1="475" y1="110" x2="520" y2="110" stroke="#334155" stroke-width="2" marker-end="url(#ngxArrow)"/>
  <circle cx="590" cy="110" r="22" fill="#16A34A"/>
  <text x="590" y="115" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  <rect x="525" y="148" width="130" height="52" rx="8" fill="#DCFCE7" stroke="#22C55E"/>
  <text x="590" y="172" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="600" fill="#166534">Lab 1.2+</text>
  <text x="590" y="188" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#15803D">AI detection</text>
</svg>