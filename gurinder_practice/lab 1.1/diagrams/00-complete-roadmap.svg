  <text x="400" y="124" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">START</text>
  <line x1="400" y1="142" x2="400" y2="158" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Phase 1 -->
