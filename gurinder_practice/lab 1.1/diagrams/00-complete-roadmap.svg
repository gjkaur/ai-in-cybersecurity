  <text x="56" y="374" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Steps 4–5 · Your Windows PC · ~10 min</text>
  <g>
    <rect x="180" y="388" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#16A34A"/>
    <circle cx="202" cy="412" r="16" fill="#16A34A"/><text x="202" y="417" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">4</text>
    <text x="285" y="410" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#166534">SSH Config</text>
    <text x="285" y="428" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Host + IdentityFile</text>
  </g>
  <line x1="380" y1="412" x2="410" y2="412" stroke="#16A34A" stroke-width="2" marker-end="url(#a)"/>
  <g>
    <rect x="410" y="388" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#16A34A"/>
    <circle cx="432" cy="412" r="16" fill="#16A34A"/><text x="432" y="417" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">5</text>
    <text x="515" y="410" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#166534">Connect EC2</text>
    <text x="515" y="428" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">whoami = ec2-user</text>
  </g>
  <line x1="400" y1="460" x2="400" y2="498" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

