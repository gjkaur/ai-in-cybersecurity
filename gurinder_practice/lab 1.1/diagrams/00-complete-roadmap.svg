  <text x="642" y="119" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="700" fill="#FFFFFF">PHASE 3 · LINUX</text>
  <text x="642" y="148" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#92400E">Steps 6–7 · ~15 min</text>

  <!-- Step 6 -->
  <rect x="556" y="180" width="172" height="68" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="574" cy="200" r="14" fill="#D97706"/>
  <text x="574" y="205" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="12" font-weight="700" fill="#FFFFFF">6</text>
  <text x="646" y="196" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#92400E">Files and Scripts</text>
  <text x="646" y="212" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">ls · cd · chmod +x</text>
  <text x="646" y="226" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">./hello.sh → Hello SOC</text>
  <line x1="642" y1="248" x2="642" y2="262" stroke="#D97706" stroke-width="2" marker-end="url(#roadArrow)"/>

  <!-- Step 7 -->
  <rect x="556" y="262" width="172" height="68" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="574" cy="282" r="14" fill="#D97706"/>
  <text x="574" y="287" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="12" font-weight="700" fill="#FFFFFF">7</text>
  <text x="646" y="278" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#92400E">SetUID Inventory</text>
  <text x="646" y="294" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">find / -perm -4000</text>
  <text x="646" y="308" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">Spot privilege escalation risk</text>

  <!-- EC2 icon -->
  <rect x="576" y="400" width="132" height="56" rx="8" fill="url(#phase4Grad)" stroke="#C2410C"/>
  <text x="642" y="424" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="600" fill="#92400E">EC2 Instance</text>
  <text x="642" y="440" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#78350F">Amazon Linux · us-east-1</text>

  <!-- Phase arrow 3→4 -->
  <line x1="740" y1="280" x2="762" y2="280" stroke="#475569" stroke-width="2.5" marker-end="url(#roadArrow)"/>

  <!-- PHASE 4 -->
  <rect x="762" y="96" width="196" height="380" rx="12" fill="url(#phase4Grad)" stroke="#DC2626" stroke-width="2"/>
  <rect x="762" y="96" width="196" height="36" rx="12" fill="#DC2626"/>
  <text x="860" y="119" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="700" fill="#FFFFFF">PHASE 4 · WEB</text>
  <text x="860" y="148" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#991B1B">Step 8 · ~15 min</text>

  <!-- Step 8 -->
  <rect x="774" y="200" width="172" height="88" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="792" cy="222" r="14" fill="#DC2626"/>
  <text x="792" y="227" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="12" font-weight="700" fill="#FFFFFF">8</text>
  <text x="864" y="218" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#991B1B">nginx Web Service</text>
  <text x="864" y="234" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">install · custom page</text>
  <text x="864" y="248" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">browser + access.log</text>
  <text x="864" y="262" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">telemetry for Lab 1.2+</text>

  <!-- DONE -->
  <line x1="860" y1="310" x2="860" y2="326" stroke="#16A34A" stroke-width="2" marker-end="url(#roadArrow)"/>
  <rect x="794" y="326" width="132" height="56" rx="10" fill="#16A34A"/>
  <text x="860" y="350" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="700" fill="#FFFFFF">LAB DONE</text>
  <text x="860" y="366" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#DCFCE7">Checkpoint + cleanup</text>

  <!-- Bottom outcome bar -->
  <rect x="28" y="492" width="924" height="48" rx="10" fill="#0F172A"/>
  <text x="490" y="514" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="600" fill="#F8FAFC">What you end up with</text>
  <text x="490" y="530" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" fill="#94A3B8">EC2 server in AWS  ·  SSH access from VS Code  ·  Linux skills  ·  nginx + logs for future AI detection labs</text>

  <!-- Legend row -->
  <rect x="28" y="448" width="924" height="34" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <rect x="44" y="458" width="12" height="12" rx="2" fill="#2563EB"/>
  <text x="64" y="468" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">AWS Console / CloudShell</text>
  <rect x="200" y="458" width="12" height="12" rx="2" fill="#16A34A"/>
  <text x="220" y="468" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">VS Code on your PC</text>
  <rect x="360" y="458" width="12" height="12" rx="2" fill="#D97706"/>
  <text x="380" y="468" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">Remote terminal on EC2</text>
  <rect x="540" y="458" width="12" height="12" rx="2" fill="#DC2626"/>
  <text x="560" y="468" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">Browser test from PC</text>
  <text x="780" y="468" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">Click any step number in the guide to jump to instructions</text>
</svg>