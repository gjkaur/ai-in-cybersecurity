<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 820" role="img" aria-label="Lab roadmap">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter><marker id="dn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="db" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="dg" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="do" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="780" height="820" fill="#F8FAFC"/>
  <rect x="20" y="20" width="740" height="780" rx="14" fill="#FFF" stroke="#E2E8F0" filter="url(#sh)"/>

  <text x="390" y="54" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="22" font-weight="700" fill="#0F172A">Lab 1.1 Roadmap</text>
  <text x="390" y="76" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">8 steps · us-east-1 · personal AWS</text>

  <circle cx="390" cy="102" r="22" fill="#16A34A"/>
  <text x="390" y="108" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">GO</text>
  <line x1="390" y1="124" x2="390" y2="142" stroke="#475569" stroke-width="2.5" marker-end="url(#dn)"/>

  <!-- Phase 1 -->
  <rect x="40" y="142" width="700" height="120" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="58" y="166" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#1E40AF">Phase 1 · AWS Setup</text>
  <rect x="68" y="178" width="190" height="58" rx="8" fill="#FFF" stroke="#2563EB"/>
  <circle cx="90" cy="207" r="14" fill="#2563EB"/><text x="90" y="212" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">1</text>
  <text x="168" y="204" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#1E3A8A">Create SSH key</text>
  <text x="168" y="220" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" fill="#64748B">soc-lab-key.pem</text>
  <line x1="258" y1="207" x2="278" y2="207" stroke="#2563EB" stroke-width="2.5" marker-end="url(#db)"/>
  <rect x="278" y="178" width="190" height="58" rx="8" fill="#FFF" stroke="#2563EB"/>
  <circle cx="300" cy="207" r="14" fill="#2563EB"/><text x="300" y="212" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">2</text>
  <text x="378" y="204" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#1E3A8A">Launch EC2</text>
  <text x="378" y="220" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" fill="#64748B">ports 22, 80</text>
  <line x1="468" y1="207" x2="488" y2="207" stroke="#2563EB" stroke-width="2.5" marker-end="url(#db)"/>
  <rect x="488" y="178" width="190" height="58" rx="8" fill="#FFF" stroke="#2563EB"/>
  <circle cx="510" cy="207" r="14" fill="#2563EB"/><text x="510" y="212" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">3</text>
  <text x="598" y="211" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#1E3A8A">Get public IP</text>
  <line x1="390" y1="262" x2="390" y2="278" stroke="#475569" stroke-width="2.5" marker-end="url(#dn)"/>

  <!-- Phase 2 -->
  <rect x="40" y="278" width="700" height="120" rx="10" fill="#ECFDF5" stroke="#16A34A" stroke-width="2"/>
  <text x="58" y="302" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#166534">Phase 2 · Connect</text>
  <rect x="198" y="314" width="190" height="58" rx="8" fill="#FFF" stroke="#16A34A"/>
  <circle cx="220" cy="343" r="14" fill="#16A34A"/><text x="220" y="348" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">4</text>
  <text x="308" y="349" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#166534">SSH config</text>
  <line x1="388" y1="343" x2="408" y2="343" stroke="#16A34A" stroke-width="2.5" marker-end="url(#dg)"/>
  <rect x="408" y="314" width="190" height="58" rx="8" fill="#FFF" stroke="#16A34A"/>
  <circle cx="430" cy="343" r="14" fill="#16A34A"/><text x="430" y="348" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">5</text>
  <text x="518" y="349" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#166534">Connect EC2</text>
  <line x1="390" y1="398" x2="390" y2="414" stroke="#475569" stroke-width="2.5" marker-end="url(#dn)"/>

  <!-- Phase 3 -->
  <rect x="40" y="414" width="700" height="120" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="58" y="438" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#92400E">Phase 3 · Linux</text>
  <rect x="198" y="450" width="190" height="58" rx="8" fill="#FFF" stroke="#D97706"/>
  <circle cx="220" cy="479" r="14" fill="#D97706"/><text x="220" y="484" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">6</text>
  <text x="308" y="485" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#92400E">Scripts and chmod</text>
  <line x1="388" y1="479" x2="408" y2="479" stroke="#D97706" stroke-width="2.5" marker-end="url(#do)"/>
  <rect x="408" y="450" width="190" height="58" rx="8" fill="#FFF" stroke="#D97706"/>
  <circle cx="430" cy="479" r="14" fill="#D97706"/><text x="430" y="484" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">7</text>
  <text x="518" y="485" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#92400E">SetUID find</text>
  <line x1="390" y1="534" x2="390" y2="550" stroke="#475569" stroke-width="2.5" marker-end="url(#dn)"/>

  <!-- Phase 4 -->
  <rect x="40" y="550" width="700" height="120" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="58" y="574" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#991B1B">Phase 4 · Web</text>
  <rect x="278" y="586" width="224" height="58" rx="8" fill="#FFF" stroke="#DC2626"/>
  <circle cx="300" cy="615" r="14" fill="#DC2626"/><text x="300" y="620" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#FFF">8</text>
  <text x="404" y="619" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#991B1B">nginx + access.log</text>
  <line x1="390" y1="670" x2="390" y2="686" stroke="#16A34A" stroke-width="2.5" marker-end="url(#dg)"/>

  <rect x="310" y="686" width="160" height="44" rx="22" fill="#16A34A"/>
  <text x="390" y="714" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">Done</text>
</svg>
