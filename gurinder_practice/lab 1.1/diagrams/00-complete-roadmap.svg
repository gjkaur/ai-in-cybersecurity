<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-label="Lab 1.1 complete step roadmap">
  <defs>
    <marker id="roadArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="roadArrowWhite" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#FFFFFF"/>
    </marker>
    <linearGradient id="phase1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DCFCE7"/>
      <stop offset="100%" stop-color="#BBF7D0"/>
    </linearGradient>
    <linearGradient id="phase3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="phase4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFGapic"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>

  <!-- Canvas -->
  <rect width="980" height="560" rx="16" fill="#F8FAFC"/>
  <rect x="12" y="12" width="956" height="536" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Title -->
  <rect x="28" y="28" width="924" height="52" rx="10" fill="#0F172A"/>
  <text x="490" y="52" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="17" font-weight="700" fill="#F8FAFC">Lab 1.1 — Complete Step Roadmap</text>
  <text x="490" y="70" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" fill="#94A3B8">Personal AWS account · us-east-1 · ~60–90 min · follow steps 1 → 8 in order</text>

  <!-- START -->
  <circle cx="58" cy="120" r="28" fill="#16A34A"/>
  <text x="58" y="116" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#FFFFFF">YOU</text>
  <text x="58" y="128" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#FFFFFF">START</text>
  <line x1="86" y1="120" x2="108" y2="120" stroke="#475569" stroke-width="2.5" marker-end="url(#roadArrow)"/>

  <!-- PHASE 1 -->
  <rect x="108" y="96" width="196" height="380" rx="12" fill="url(#phase1Grad)" stroke="#2563EB" stroke-width="2"/>
  <rect x="108" y="96" width="196" height="36" rx="12" fill="#2563EB"/>
  <text x="206" y="119" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="700" fill="#FFFFFF">PHASE 1 · AWS</text>
  <text x="206" y="148" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#1E40AF">Steps 1–3 · ~20 min</text>

  <!-- Step 1 -->
  <rect x="120" y="162" width="172" height="68" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="138" cy="182" r="14" fill="#2563EB"/>
  <text x="138" y="187" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
  <text x="210" y="178" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#1E3A8A">Create SSH Key</text>
  <text x="210" y="194" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">CloudShell · soc-lab-key.pem</text>
  <text x="210" y="208" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">Download to your PC</text>
  <line x1="206" y1="230" x2="206" y2="244" stroke="#2563EB" stroke-width="2" marker-end="url(#roadArrow)"/>

  <!-- Step 2 -->
  <rect x="120" y="244" width="172" height="68" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="138" cy="264" r="14" fill="#2563EB"/>
  <text x="138" y="269" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
  <text x="210" y="260" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#1E3A8A">Launch EC2 Server</text>
  <text x="210" y="276" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">Security Group · ports 22+80</text>
  <text x="210" y="290" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">Amazon Linux 2023 · running</text>
  <line x1="206" y1="312" x2="206" y2="326" stroke="#2563EB" stroke-width="2" marker-end="url(#roadArrow)"/>

  <!-- Step 3 -->
  <rect x="120" y="326" width="172" height="68" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="138" cy="346" r="14" fill="#2563EB"/>
  <text x="138" y="351" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
  <text x="210" y="342" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#1E3A8A">Get Public IP</text>
  <text x="210" y="358" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">Write IP in worksheet</text>
  <text x="210" y="372" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">Screenshot step-03-ip.png</text>

  <!-- Phase arrow 1→2 -->
  <line x1="304" y1="280" x2="326" y2="280" stroke="#475569" stroke-width="2.5" marker-end="url(#roadArrow)"/>

  <!-- PHASE 2 -->
  <rect x="326" y="96" width="196" height="380" rx="12" fill="url(#phase2Grad)" stroke="#16A34A" stroke-width="2"/>
  <rect x="326" y="96" width="196" height="36" rx="12" fill="#16A34A"/>
  <text x="424" y="119" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="700" fill="#FFFFFF">PHASE 2 · CONNECT</text>
  <text x="424" y="148" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#166534">Steps 4–5 · ~10 min</text>

  <!-- Step 4 -->
  <rect x="338" y="180" width="172" height="68" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <circle cx="356" cy="200" r="14" fill="#16A34A"/>
  <text x="356" y="205" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
  <text x="428" y="196" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#166534">VS Code SSH Config</text>
  <text x="428" y="212" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">Host SOC-Instance</text>
  <text x="428" y="226" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">IdentityFile + public IP</text>
  <line x1="424" y1="248" x2="424" y2="262" stroke="#16A34A" stroke-width="2" marker-end="url(#roadArrow)"/>

  <!-- Step 5 -->
  <rect x="338" y="262" width="172" height="68" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <circle cx="356" cy="282" r="14" fill="#16A34A"/>
  <text x="356" y="287" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="12" font-weight="700" fill="#FFFFFF">5</text>
  <text x="428" y="278" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="700" fill="#166534">Connect to EC2</text>
  <text x="428" y="294" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">Remote terminal · ec2-user</text>
  <text x="428" y="308" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">whoami + hostnamectl</text>

  <!-- Windows PC icon between phase 2 and 3 -->
  <rect x="358" y="400" width="132" height="56" rx="8" fill="#DBEAFE" stroke="#2563EB"/>
  <text x="424" y="424" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" font-weight="600" fill="#1E40AF">Your Windows PC</text>
  <text x="424" y="440" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="8" fill="#64748B">VS Code Remote SSH</text>

  <!-- Phase arrow 2→3 -->
  <line x1="522" y1="280" x2="544" y2="280" stroke="#475569" stroke-width="2.5" marker-end="url(#roadArrow)"/>

  <!-- PHASE 3 -->
  <rect x="544" y="96" width="196" height="380" rx="12" fill="url(#phase3Grad)" stroke="#D97706" stroke-width="2"/>
