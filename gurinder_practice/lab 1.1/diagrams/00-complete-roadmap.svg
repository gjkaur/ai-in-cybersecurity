  <text x="56" y="188" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#1E40AF">Phase 1 — AWS Setup</text>
  <text x="56" y="206" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Steps 1–3 · CloudShell · ~20 min</text>
  <g>
    <rect x="70" y="220" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#2563EB"/>
    <circle cx="92" cy="244" r="16" fill="#2563EB"/><text x="92" y="249" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">1</text>
    <text x="175" y="242" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Create SSH Key</text>
    <text x="175" y="260" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">soc-lab-key.pem</text>
    <text x="175" y="276" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Download to PC</text>
  </g>
  <line x1="270" y1="256" x2="300" y2="256" stroke="#2563EB" stroke-width="2" marker-end="url(#a)"/>
  <g>
    <rect x="300" y="220" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#2563EB"/>
    <circle cx="322" cy="244" r="16" fill="#2563EB"/><text x="322" y="249" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">2</text>
    <text x="405" y="242" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Launch EC2</text>
    <text x="405" y="260" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Security group</text>
    <text x="405" y="276" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">ports 22 + 80</text>
  </g>
  <line x1="500" y1="256" x2="530" y2="256" stroke="#2563EB" stroke-width="2" marker-end="url(#a)"/>
  <g>
    <rect x="530" y="220" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#2563EB"/>
    <circle cx="552" cy="244" r="16" fill="#2563EB"/><text x="552" y="249" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">3</text>
    <text x="635" y="242" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Get Public IP</text>
    <text x="635" y="260" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Record in worksheet</text>
  </g>
  <line x1="400" y1="310" x2="400" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

