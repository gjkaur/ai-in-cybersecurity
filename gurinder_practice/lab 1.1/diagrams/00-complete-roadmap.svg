<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 860" role="img" aria-label="Lab roadmap">
  <defs>
    
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="dn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="db" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dg" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="do" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="dr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <rect width="800" height="860" fill="#F1F5F9"/>

  <rect x="24" y="24" width="752" height="812" rx="16" fill="#FFF" stroke="#E2E8F0" filter="url(#sh)"/>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="22" font-weight="700" fill="#0F172A">Lab 1.1 Roadmap</text>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" fill="#64748B">8 steps · us-east-1 · personal AWS</text>

  <circle cx="400" cy="108" r="24" fill="#16A34A"/>
  <text x="400" y="114" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">GO</text>
  <line x1="400" y1="132" x2="400" y2="152" stroke="#475569" stroke-width="2.5" marker-end="url(#dn)"/>

  <!-- Phase 1 -->
  <rect x="48" y="148" width="704" height="130" rx="12" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="68" y="174" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#1E40AF">Phase 1 · AWS Setup</text>
  <g>
    <rect x="80" y="188" width="200" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="1.5" filter="url(#sh)"/>
    <circle cx="104" cy="214" r="16" fill="#2563EB"/><text x="104" y="219" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">1</text>
    <text x="190" y="214" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Create SSH key</text>
    <text x="190" y="232" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">soc-lab-key.pem</text>
  </g>
  <line x1="280" y1="222" x2="308" y2="222" stroke="#2563EB" stroke-width="2.5" marker-end="url(#db)"/>
  <g>
    <rect x="308" y="188" width="200" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="1.5" filter="url(#sh)"/>
    <circle cx="332" cy="214" r="16" fill="#2563EB"/><text x="332" y="219" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">2</text>
    <text x="418" y="214" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Launch EC2</text>
    <text x="418" y="232" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">ports 22, 80</text>
  </g>
  <line x1="508" y1="222" x2="536" y2="222" stroke="#2563EB" stroke-width="2.5" marker-end="url(#db)"/>
  <g>
    <rect x="536" y="188" width="200" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="1.5" filter="url(#sh)"/>
    <circle cx="560" cy="214" r="16" fill="#2563EB"/><text x="560" y="219" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">3</text>
    <text x="646" y="222" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Get public IP</text>
  </g>
  <line x1="400" y1="278" x2="400" y2="296" stroke="#475569" stroke-width="2.5" marker-end="url(#dn)"/>

  <!-- Phase 2 -->
  <rect x="48" y="296" width="704" height="130" rx="12" fill="#ECFDF5" stroke="#16A34A" stroke-width="2"/>
  <text x="68" y="322" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#166534">Phase 2 · Connect</text>
  <g>
    <rect x="210" y="336" width="200" height="68" rx="10" fill="#FFF" stroke="#16A34A" stroke-width="1.5" filter="url(#sh)"/>
    <circle cx="234" cy="362" r="16" fill="#16A34A"/><text x="234" y="367" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">4</text>
    <text x="320" y="370" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#166534">SSH config</text>
  </g>
  <line x1="410" y1="370" x2="438" y2="370" stroke="#16A34A" stroke-width="2.5" marker-end="url(#dg)"/>
  <g>
    <rect x="438" y="336" width="200" height="68" rx="10" fill="#FFF" stroke="#16A34A" stroke-width="1.5" filter="url(#sh)"/>
    <circle cx="462" cy="362" r="16" fill="#16A34A"/><text x="462" y="367" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">5</text>
    <text x="548" y="370" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#166534">Connect EC2</text>
  </g>
  <line x1="400" y1="426" x2="400" y2="444" stroke="#475569" stroke-width="2.5" marker-end="url(#dn)"/>

  <!-- Phase 3 -->
  <rect x="48" y="444" width="704" height="130" rx="12" fill="#fffbeb" stroke="#D97706" stroke-width="2"/>
  <text x="68" y="470" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#92400E">Phase 3 · Linux</text>
  <g>
    <rect x="210" y="484" width="200" height="68" rx="10" fill="#FFF" stroke="#D97706" stroke-width="1.5" filter="url(#sh)"/>
    <circle cx="234" cy="510" r="16" fill="#D97706"/><text x="234" y="515" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">6</text>
    <text x="320" y="518" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#92400E">Scripts &amp; chmod</text>
  </g>
  <line x1="410" y1="518" x2="438" y2="518" stroke="#D97706" stroke-width="2.5" marker-end="url(#do)"/>
  <g>
    <rect x="438" y="484" width="200" height="68" rx="10" fill="#FFF" stroke="#D97706" stroke-width="1.5" filter="url(#sh)"/>
    <circle cx="462" cy="510" r="16" fill="#D97706"/><text x="462" y="515" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">7</text>
    <text x="548" y="518" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#92400E">SetUID find</text>
  </g>
  <line x1="400" y1="574" x2="400" y2="592" stroke="#475569" stroke-width="2.5" marker-end="url(#dn)"/>

  <!-- Phase 4 -->
  <rect x="48" y="592" width="704" height="130" rx="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="68" y="618" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#991B1B">Phase 4 · Web</text>
  <g>
    <rect x="300" y="632" width="200" height="68" rx="10" fill="#FFF" stroke="#DC2626" stroke-width="1.5" filter="url(#sh)"/>
    <circle cx="324" cy="658" r="16" fill="#DC2626"/><text x="324" y="663" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#FFF">8</text>
    <text x="410" y="662" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#991B1B">nginx + access.log</text>
  </g>
  <line x1="400" y1="722" x2="400" y2="740" stroke="#16A34A" stroke-width="2.5" marker-end="url(#dg)"/>

  <rect x="320" y="740" width="160" height="48" rx="24" fill="#16A34A" filter="url(#sh)"/>
  <text x="400" y="770" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="15" font-weight="700" fill="#FFF">Done</text>
</svg>
