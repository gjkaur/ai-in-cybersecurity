  <rect x="40" y="498" width="720" height="148" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="56" y="524" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#92400E">Phase 3 — Linux Skills</text>
  <text x="56" y="542" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Steps 6–7 · Remote terminal on EC2 · ~15 min</text>
  <g>
    <rect x="180" y="556" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#D97706"/>
    <circle cx="202" cy="580" r="16" fill="#D97706"/><text x="202" y="585" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">6</text>
    <text x="285" y="578" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#92400E">Scripts</text>
    <text x="285" y="596" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">chmod · ./</text>
  </g>
  <line x1="380" y1="580" x2="410" y2="580" stroke="#D97706" stroke-width="2" marker-end="url(#a)"/>
  <g>
    <rect x="410" y="556" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#D97706"/>
    <circle cx="432" cy="580" r="16" fill="#D97706"/><text x="432" y="585" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">7</text>
    <text x="515" y="578" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#92400E">SetUID Find</text>
    <text x="515" y="596" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">privilege risk</text>
  </g>
  <line x1="400" y1="628" x2="400" y2="666" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Phase 4 -->
  <rect x="40" y="666" width="720" height="120" rx="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="56" y="692" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#991B1B">Phase 4 — Web Service</text>
  <text x="56" y="710" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Step 8 · nginx + browser test · ~15 min</text>
  <g>
    <rect x="300" y="724" width="200" height="72" rx="10" fill="#FFFFFF" stroke="#DC2626"/>
    <circle cx="322" cy="748" r="16" fill="#DC2626"/><text x="322" y="753" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">8</text>
    <text x="405" y="746" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#991B1B">nginx + logs</text>
    <text x="405" y="764" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">access.log telemetry</text>
  </g>
  <line x1="400" y1="796" x2="400" y2="812" stroke="#16A34A" stroke-width="2" marker-end="url(#a)"/>

