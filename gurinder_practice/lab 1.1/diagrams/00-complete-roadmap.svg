  <text x="400" y="840" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">LAB DONE</text>

  <rect x="40" y="868" width="720" height="28" rx="8" fill="#0F172A"/>
  <text x="400" y="887" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#F8FAFC">Result: EC2 in AWS + SSH access + Linux skills + nginx logs for Lab 1.2</text>
