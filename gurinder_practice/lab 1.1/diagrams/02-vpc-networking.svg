  <ellipse cx="62" cy="158" rx="8" ry="6" fill="#2563EB" opacity="0.25"/>
  <ellipse cx="78" cy="158" rx="8" ry="6" fill="#2563EB" opacity="0.25"/>
  <text x="98" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#2563EB">Internet</text>
  <text x="98" y="186" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#64748B">incoming</text>
  <rect x="214" y="110" width="706" height="220" rx="14" fill="#FFFFFF" stroke="#475569" stroke-width="2" stroke-dasharray="8 4" filter="url(#sh)"/>
  <text x="234" y="134" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#475569">VPC  ·  Subnet</text>
  <rect x="240" y="150" width="280" height="160" rx="12" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2" filter="url(#sh)"/>
  <text x="380" y="178" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#DC2626">Security Group</text>
  <text x="380" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#64748B">Virtual firewall</text>
  <rect x="268" y="212" width="108" height="28" rx="6" fill="#DC2626"/>
  <text x="322" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#FFF">ALLOW :22</text>
  <rect x="384" y="212" width="108" height="28" rx="6" fill="#DC2626"/>
  <text x="438" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#FFF">ALLOW :80</text>
  <rect x="268" y="252" width="224" height="28" rx="6" fill="#475569"/>
  <text x="380" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#FFF">implicit deny (all else blocked)</text>
  <rect x="548" y="160" width="340" height="140" rx="12" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2" filter="url(#sh)"/>
  <rect x="568" y="176" width="36" height="34" rx="4" fill="#FF9900" opacity="0.2"/>
  <rect x="572" y="181" width="28" height="6" rx="2" fill="#FF9900" opacity="0.5"/>
  <rect x="572" y="190" width="28" height="6" rx="2" fill="#FF9900" opacity="0.5"/>
  <rect x="572" y="199" width="28" height="6" rx="2" fill="#FF9900" opacity="0.5"/>
  <text x="700" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#16A34A">EC2 Instance</text>
  <text x="700" y="220" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#64748B">Amazon Linux 2023</text>
  <text x="700" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#64748B">Only matching traffic reaches the server</text>
  <rect x="40" y="348" width="880" height="24" rx="6" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="480" y="364" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#2563EB">Think of the Security Group as a bouncer — only ports 22 and 80 get in</text>

</svg>
