<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" role="img" aria-label="SSH key authentication">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter><marker id="k" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="860" height="280" fill="#F8FAFC"/>
  <text x="430" y="36" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="20" font-weight="700" fill="#0F172A">SSH Key Authentication</text>
  <text x="430" y="56" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Private key on your PC matches public key on the server</text>

  <path d="M268 150 L308 150" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#k)"/>
  <path d="M552 150 L592 150" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#k)"/>

  <rect x="48" y="88" width="220" height="140" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2" filter="url(#sh)"/>
  <text x="158" y="116" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#1E40AF">Your PC</text>
  <rect x="72" y="130" width="172" height="44" rx="8" fill="#FFF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="158" y="158" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#334155">soc-lab-key.pem</text>
  <text x="158" y="192" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Private key — keep secret</text>
  <text x="158" y="210" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#DC2626" font-weight="600">Never share this file</text>

  <rect x="308" y="108" width="244" height="84" rx="12" fill="#FFF" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="430" y="136" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#2563EB">Encrypted tunnel</text>
  <text x="430" y="156" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Port 22 · no password</text>
  <text x="430" y="176" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">VS Code Remote-SSH</text>

  <rect x="592" y="88" width="220" height="140" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" filter="url(#sh)"/>
  <text x="702" y="116" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#166534">EC2 Server</text>
  <rect x="616" y="130" width="172" height="44" rx="8" fill="#FFF" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="702" y="158" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#334155">authorized_keys</text>
  <text x="702" y="192" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Public key from AWS</text>
  <text x="702" y="210" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Login: ec2-user</text>
</svg>
