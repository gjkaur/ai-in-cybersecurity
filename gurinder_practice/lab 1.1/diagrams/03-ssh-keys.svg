<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-label="SSH key authentication">
  <defs>
    <marker id="sshArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563EB"/>
    </marker>
  </defs>
  <rect width="760" height="260" rx="14" fill="#F8FAFC"/>
  <text x="380" y="32" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="15" font-weight="700" fill="#0F172A">SSH — Secure Shell (Key Authentication)</text>
  <rect x="40" y="56" width="240" height="160" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="160" y="88" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="13" font-weight="700" fill="#1E40AF">Your PC</text>
  <rect x="68" y="104" width="184" height="44" rx="8" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="160" y="124" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" fill="#334155">soc-lab-key.pem</text>
  <text x="160" y="140" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">PEM — private key (secret)</text>
  <text x="160" y="178" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">Never share or upload this file</text>
  <rect x="480" y="56" width="240" height="160" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="600" y="88" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="13" font-weight="700" fill="#166534">EC2 Server</text>
  <rect x="508" y="104" width="184" height="44" rx="8" fill="#FFFFFF" stroke="#86EFAC"/>
  <text x="600" y="124" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" fill="#334155">~/.ssh/authorized_keys</text>
  <text x="600" y="140" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">Public key (installed by AWS)</text>
  <text x="600" y="178" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">Login user: ec2-user</text>
  <rect x="292" y="108" width="176" height="56" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-dasharray="4 3"/>
  <text x="380" y="132" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="11" font-weight="600" fill="#2563EB">Encrypted tunnel</text>
  <text x="380" y="148" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="9" fill="#64748B">Port 22 · no password</text>
  <line x1="280" y1="136" x2="292" y2="136" stroke="#2563EB" stroke-width="2" marker-end="url(#sshArrow)"/>
  <line x1="468" y1="136" x2="480" y2="136" stroke="#2563EB" stroke-width="2"/>
  <rect x="40" y="228" width="680" height="24" rx="6" fill="#EFF6FF"/>
  <text x="380" y="244" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, san-serif" font-size="10" fill="#1E40AF">VS Code Remote-SSH uses this key to open editor, files, and terminal on EC2</text>
</svg>