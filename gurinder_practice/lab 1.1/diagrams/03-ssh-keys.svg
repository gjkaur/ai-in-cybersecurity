<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" role="img" aria-label="SSH key authentication">
  <defs>
    <marker id="sa" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8Z" fill="#2563EB"/></marker>
  </defs>
  <rect width="820" height="320" fill="#F8FAFC"/>
  <text x="410" y="36" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="18" font-weight="700" fill="#0F172A">SSH — Secure Shell</text>
  <text x="410" y="58" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" fill="#64748B">Key-based authentication (no password)</text>

  <rect x="40" y="84" width="240" height="180" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="160" y="112" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#1E40AF">Your PC</text>
  <rect x="68" y="128" width="184" height="56" rx="8" fill="#FFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="88" y="152" font-family="Arial, Helvetica, Sans-serif" font-size="16" fill="#2563EB">🔑</text>
  <text x="160" y="152" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#334155">soc-lab-key.pem</text>
  <text x="160" y="172" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">PEM = private key (secret)</text>
  <text x="160" y="228" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Never share this file</text>

  <rect x="540" y="84" width="240" height="180" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="660" y="112" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#166534">EC2 Server</text>
  <rect x="568" y="128" width="184" height="56" rx="8" fill="#FFF" stroke="#86EFAC" stroke-width="2"/>
  <text x="588" y="152" font-family="Arial, Helvetica, Sans-serif" font-size="16" fill="#16A34A">🔒</text>
  <text x="660" y="156" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#334155">authorized_keys</text>
  <text x="660" y="172" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Public key (from AWS)</text>
  <text x="660" y="228" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Login: ec2-user</text>

  <rect x="310" y="130" width="120" height="88" rx="10" fill="#FFF" stroke="#2563EB" stroke-dasharray="5 3"/>
  <text x="410" y="162" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="600" fill="#2563EB">Encrypted</text>
  <text x="410" y="182" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="600" fill="#2563EB">tunnel</text>
  <text x="410" y="204" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">Port 22</text>
  <line x1="280" y1="174" x2="290" y2="174" stroke="#2563EB" stroke-width="2" marker-end="url(#sa)"/>
  <line x1="530" y1="174" x2="540" y2="174" stroke="#2563EB" stroke-width="2" marker-end="url(#sa)"/>

  <rect x="40" y="280" width="740" height="28" rx="8" fill="#EFF6FF"/>
  <text x="410" y="299" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#1E40AF">VS Code Remote-SSH uses the private key to open terminal, files, and editor on EC2</text>
</svg>
