  <rect x="36" y="148" width="200" height="200" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="136" y="178" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#1E3A8A">Your Windows PC</text>
  <text x="136" y="200" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#475569">VS Code Remote SSH</text>
  <text x="136" y="218" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#475569">soc-lab-key.pem</text>
  <text x="136" y="236" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#475569">Web browser</text>
