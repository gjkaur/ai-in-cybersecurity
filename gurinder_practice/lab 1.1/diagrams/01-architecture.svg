<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="Lab architecture">
  <defs>
    
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    
    <linearGradient id="aws" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9900"/><stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <marker id="ssh" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="http" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="net" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <rect width="900" height="480" fill="#F1F5F9"/>
  <rect x="24" y="24" width="852" height="432" rx="16" fill="#FFF" stroke="#E2E8F0" filter="url(#sh)"/>

  <text x="450" y="58" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="20" font-weight="700" fill="#0F172A">Lab Architecture</text>
  <text x="450" y="78" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" fill="#64748B">Your PC connects over the internet to EC2 inside AWS</text>

  <!-- Internet -->
  <rect x="48" y="96" width="804" height="40" rx="8" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
  <circle cx="72" cy="116" r="10" fill="#0284C7" opacity="0.2"/>
  <circle cx="72" cy="116" r="5" fill="none" stroke="#0284C7" stroke-width="1.5"/>
  <text x="450" y="122" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="600" fill="#0369A1">Internet</text>

  <!-- Your PC -->
  <g filter="url(#sh)">
    <rect x="48" y="160" width="200" height="200" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  </g>
  <rect x="68" y="178" width="36" height="28" rx="6" fill="#2563EB"/>
  <rect x="74" y="184" width="24" height="16" rx="2" fill="#DBEAFE" stroke="#FFF" stroke-width="1"/>
  <text x="128" y="198" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#1E40AF">Your PC</text>
  <text x="128" y="218" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#475569">VS Code + browser</text>
  <text x="128" y="236" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#475569">soc-lab-key.pem</text>
  <g>
    <rect x="68" y="258" width="76" height="28" rx="6" fill="#2563EB"/>
    <text x="106" y="277" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="700" fill="#FFF">SSH :22</text>
    <rect x="152" y="258" width="76" height="28" rx="6" fill="#16A34A"/>
    <text x="192" y="277" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="700" fill="#FFF">HTTP :80</text>
  </g>

  <!-- VPC -->
  <rect x="280" y="148" width="572" height="224" rx="12" fill="#FAFAFA" stroke="#94A3B8" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="300" y="172" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#64748B">VPC (Virtual Private Cloud)</text>

  <!-- Security Group -->
  <rect x="300" y="184" width="532" height="172" rx="10" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="320" y="208" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="700" fill="#92400E">Security Group</text>
  <rect x="320" y="216" width="88" height="24" rx="5" fill="#DC2626"/>
  <text x="364" y="232" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" font-weight="700" fill="#FFF">ALLOW :22</text>
  <rect x="416" y="216" width="88" height="24" rx="5" fill="#DC2626"/>
  <text x="460" y="232" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" font-weight="700" fill="#FFF">ALLOW :80</text>
  <text x="520" y="232" font-family="Arial, Helvetica, Sans-serif" font-size="9" fill="#64748B">deny all other ports</text>

  <!-- EC2 -->
  <rect x="320" y="252" width="492" height="88" rx="10" fill="url(#aws)" stroke="#C2410C" stroke-width="2"/>
  <text x="340" y="278" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#FFF">EC2</text>
  <text x="340" y="296" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#FFF7ED">Amazon Linux 2023 · t2.medium</text>
  <rect x="520" y="264" width="130" height="56" rx="8" fill="rgba(255,255,255,0.25)" stroke="#FFF" stroke-width="1.5"/>
  <text x="585" y="288" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="700" fill="#FFF">nginx</text>
  <text x="585" y="304" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" fill="#FFF7ED">listens :80</text>
  <rect x="660" y="264" width="140" height="56" rx="8" fill="rgba(255,255,255,0.25)" stroke="#FFF" stroke-width="1.5"/>
  <text x="730" y="288" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="700" fill="#FFF">access.log</text>
  <text x="730" y="304" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" fill="#FFF7ED">telemetry</text>

  <!-- Arrows through internet to EC2 -->
  
  <path d="M248 272 L248 116 L400 116 L400 252" fill="none" stroke="#2563EB" stroke-width="2.5" marker-end="url(#ssh)"/>
  <rect x="263" y="96" width="34" height="20" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="1"/>
  <text x="280" y="110" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#2563EB">SSH</text>
  
  <path d="M248 286 L248 116 L680 116 L680 272" fill="none" stroke="#16A34A" stroke-width="2.5" marker-end="url(#http)"/>
  <rect x="500" y="96" width="40" height="20" rx="10" fill="#FFF" stroke="#16A34A" stroke-width="1"/>
  <text x="520" y="110" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#16A34A">HTTP</text>

  <rect x="48" y="400" width="804" height="36" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="68" y="412" width="12" height="12" rx="2" fill="#2563EB"/>
  <text x="88" y="422" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#475569">SSH = remote terminal</text>
  <rect x="210" y="412" width="12" height="12" rx="2" fill="#16A34A"/>
  <text x="230" y="422" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#475569">HTTP = web browser</text>
  <rect x="380" y="412" width="12" height="12" rx="2" fill="#FF9900"/>
  <text x="400" y="422" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#475569">Orange = AWS resources</text>
</svg>
