  <text x="90" y="275" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#FFF">SSH 22</text>
  <rect x="144" y="256" width="76" height="28" rx="6" fill="#16A34A"/>
  <text x="174" y="275" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#FFF">HTTP 80</text>

