  <text x="565" y="240" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#FFF">DENY rest</text>

  <rect x="300" y="268" width="484" height="160" rx="12" fill="url(#aws)" stroke="#C2410C" stroke-width="2"/>
