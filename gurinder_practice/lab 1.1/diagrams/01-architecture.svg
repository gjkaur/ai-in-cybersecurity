  <text x="390" y="386" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#FFF7ED">web service</text>
  <rect x="480" y="340" width="284" height="68" rx="8" fill="rgba(255,255,255,0.25)" stroke="#FFF"/>
  <text x="622" y="376" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#FFF">/var/log/nginx/access.log</text>

  <path d="M236 220 C270 220 280 280" fill="none" stroke="#2563EB" stroke-width="3" marker-end="url(#ab)"/>
  <text x="248" y="248" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#2563EB">SSH :22</text>
  <path d="M236 290 C270 290 280 340" fill="none" stroke="#16A34A" stroke-width="3" marker-end="url(#ag)"/>
  <text x="248" y="318" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#16A34A">HTTP :80</text>
  <rect x="620" y="268" width="120" height="36" rx="8" fill="#FFF" stroke="#64748B"/>
  <text x="680" y="284" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#334155">Public IP</text>
  <text x="680" y="298" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" fill="#64748B">from Step 3</text>

  <rect x="36" y="468" width="788" height="24" rx="6" fill="#F1F5F9"/>
  <text x="430" y="484" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Blue = SSH (Secure Shell) · Green = HTTP (Hypertext Transfer Protocol) · Orange = AWS resources</text>
