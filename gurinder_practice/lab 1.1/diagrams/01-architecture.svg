  <rect x="300" y="222" width="100" height="26" rx="6" fill="#DC2626"/>
  <text x="350" y="240" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#FFF">ALLOW 22</text>
  <rect x="410" y="222" width="100" height="26" rx="6" fill="#DC2626"/>
  <text x="460" y="240" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" font-weight="600" fill="#FFF">ALLOW 80</text>
