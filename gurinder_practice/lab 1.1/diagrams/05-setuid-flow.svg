<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" role="img" aria-label="SetUID flow">
  <defs>
    
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="u" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 2 L10 6 L1 10" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <rect width="880" height="280" fill="#F1F5F9"/>
  <text x="440" y="36" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="20" font-weight="700" fill="#0F172A">SetUID — Privilege Escalation Risk</text>
  <text x="440" y="58" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" fill="#64748B">Program runs as the file owner, not who launched it</text>

  <rect x="48" y="88" width="180" height="110" rx="14" fill="#DBEAFE" stroke="#2563EB" stroke-width="2" filter="url(#sh)"/>
  <text x="138" y="120" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#1E40AF">ec2-user</text>
  <text x="138" y="142" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">normal privilege</text>
  <text x="138" y="162" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">runs passwd</text>

  <path d="M228 143 L268 143" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#u)"/>
  <rect x="240" y="128" width="56" height="18" rx="9" fill="#FFF" stroke="#94A3B8"/>
  <text x="268" y="141" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" fill="#64748B">executes</text>

  <rect x="268" y="88" width="220" height="110" rx="14" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" filter="url(#sh)"/>
  <text x="378" y="120" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="700" fill="#991B1B">/usr/bin/passwd</text>
  <text x="378" y="142" text-anchor="middle" font-family="monospace" font-size="12" fill="#7F1D1D">-rwsr-xr-x</text>
  <rect x="368" y="130" width="10" height="14" rx="2" fill="#DC2626" opacity="0.25"/>
  <text x="378" y="164" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#7F1D1D">s = SetUID bit (runs as root)</text>

  <path d="M488 143 L528 143" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#u)"/>
  <rect x="500" y="128" width="64" height="18" rx="9" fill="#FFF" stroke="#94A3B8"/>
  <text x="532" y="141" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="9" fill="#64748B">runs as</text>

  <rect x="528" y="88" width="180" height="110" rx="14" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" filter="url(#sh)"/>
  <text x="618" y="120" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="14" font-weight="700" fill="#166534">root</text>
  <text x="618" y="142" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">effective user</text>
  <text x="618" y="162" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">elevated privileges</text>

  <rect x="48" y="218" width="784" height="44" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="440" y="238" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" font-weight="600" fill="#92400E">Defender action: inventory SetUID binaries on every Linux host</text>
  <text x="440" y="254" text-anchor="middle" font-family="monospace" font-size="10" fill="#78350F">find / -perm -4000 -exec ls -l &#123;&#125; &#92;; 2&gt;/dev/null</text>
</svg>
