<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 240" role="img" aria-label="SetUID privilege flow">
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="780" height="240" fill="#F8FAFC"/>
  <text x="390" y="32" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="18" font-weight="700" fill="#0F172A">SetUID</text>
  <text x="390" y="52" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#64748B">Runs as file owner, not who launched it</text>

  <rect x="50" y="80" width="170" height="90" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="135" y="112" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="600" fill="#1E40AF">ec2-user</text>
  <text x="135" y="134" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">runs passwd</text>

  <line x1="220" y1="125" x2="268" y2="125" stroke="#475569" stroke-width="3" marker-end="url(#a)"/>

  <rect x="268" y="80" width="200" height="90" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="368" y="112" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="12" font-weight="600" fill="#991B1B">/usr/bin/passwd</text>
  <text x="368" y="134" text-anchor="middle" font-family="monospace" font-size="11" fill="#7F1D1D">-rwsr-xr-x</text>
  <text x="368" y="154" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#7F1D1D">s = SetUID bit</text>

  <line x1="468" y1="125" x2="516" y2="125" stroke="#475569" stroke-width="3" marker-end="url(#a)"/>

  <rect x="516" y="80" width="170" height="90" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="601" y="112" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="13" font-weight="600" fill="#166534">root</text>
  <text x="601" y="134" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="10" fill="#64748B">elevated run</text>

  <rect x="50" y="188" width="680" height="36" rx="8" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="390" y="210" text-anchor="middle" font-family="Arial, Helvetica, Sans-serif" font-size="11" fill="#92400E">Defenders: find SetUID binaries with find / -perm -4000</text>
</svg>
