<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 119" width="144" height="119" role="img" aria-label="Over-Permissioned Example">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="144" height="119" fill="#F8FAFC"/>
  <text x="106" y="15" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#0F172A">Over-Permissioned Example</text>
  <rect x="80" y="22" width="53" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="33" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">Developer Role</text>
  <line x1="106" y1="39" x2="106" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="72" y="44" width="68" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">AdministratorAccess</text>
  <line x1="106" y1="61" x2="106" y2="60" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="66" y="66" width="80" height="39" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="106" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#2563EB">Can modify IAM</text>
  <text x="75" y="89" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Can delete S3 buckets</text>
  <text x="75" y="97" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Can terminate EC2 instances</text>
  <text x="75" y="105" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Can disable logging</text>
</svg>
