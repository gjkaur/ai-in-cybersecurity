<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 123" width="144" height="123" role="img" aria-label="Linux Directory Structure">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="144" height="123" fill="#F8FAFC"/>
  <text x="106" y="15" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#0F172A">Linux Directory Structure</text>
  <rect x="82" y="22" width="49" height="87" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="106" y="32" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#2563EB">/</text>
  <text x="91" y="45" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── bin</text>
  <text x="91" y="53" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── etc</text>
  <text x="91" y="61" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── home</text>
  <text x="91" y="69" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── var</text>
  <text x="91" y="77" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── usr</text>
  <text x="91" y="85" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── tmp</text>
  <text x="91" y="93" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── dev</text>
  <text x="91" y="101" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── proc</text>
  <text x="91" y="109" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• └── boot</text>
</svg>
