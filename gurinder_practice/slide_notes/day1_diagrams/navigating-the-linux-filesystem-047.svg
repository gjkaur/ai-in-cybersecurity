<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 284 248" width="220" height="192" role="img" aria-label="Linux Directory Structure">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="284" height="248" fill="#F8FAFC"/>
  <text x="211" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Linux Directory Structure</text>
  <rect x="162" y="44" width="98" height="176" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="211" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#2563EB">/</text>
  <text x="179" y="90" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• ├── bin</text>
  <text x="179" y="106" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• ├── etc</text>
  <text x="179" y="122" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• ├── home</text>
  <text x="179" y="138" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• ├── var</text>
  <text x="179" y="154" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• ├── usr</text>
  <text x="179" y="170" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• ├── tmp</text>
  <text x="179" y="186" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• ├── dev</text>
  <text x="179" y="202" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• ├── proc</text>
  <text x="179" y="218" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• └── boot</text>
</svg>
