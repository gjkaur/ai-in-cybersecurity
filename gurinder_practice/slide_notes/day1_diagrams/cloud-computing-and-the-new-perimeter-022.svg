<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144" role="img" aria-label="Whiteboard Diagram">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="144" height="144" fill="#F8FAFC"/>
  <text x="106" y="15" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#0F172A">Diagram</text>
  <rect x="83" y="22" width="46" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="33" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">AWS</text>
  <rect x="69" y="43" width="74" height="87" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="106" y="53" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#2563EB">AWS Secures:</text>
  <text x="78" y="66" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Servers</text>
  <text x="78" y="74" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Storage</text>
  <text x="78" y="82" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Network</text>
  <text x="78" y="90" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Data Centers</text>
  <text x="78" y="98" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Customer Secures:</text>
  <text x="78" y="106" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Users</text>
  <text x="78" y="114" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Data</text>
  <text x="78" y="122" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Applications</text>
  <text x="78" y="130" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Permissions</text>
</svg>
