  <text x="215" y="266" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Customer Secures:</text>
  <text x="215" y="288" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Users</text>
  <text x="215" y="310" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Data</text>
  <text x="215" y="332" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Applications</text>
  <text x="215" y="354" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Permissions</text>
</svg>
