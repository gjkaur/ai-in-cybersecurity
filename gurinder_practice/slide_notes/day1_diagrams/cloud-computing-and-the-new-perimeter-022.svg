<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 284 290" width="220" height="225" role="img" aria-label="Whiteboard Diagram">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="284" height="290" fill="#F8FAFC"/>
  <text x="211" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Diagram</text>
  <rect x="165" y="44" width="92" height="33" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="211" y="66" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="600" fill="#0F172A">AWS</text>
  <rect x="146" y="86" width="130" height="176" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="211" y="107" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#2563EB">AWS Secures:</text>
  <text x="163" y="132" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Servers</text>
  <text x="163" y="148" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Storage</text>
  <text x="163" y="164" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Network</text>
  <text x="163" y="180" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Data Centers</text>
  <text x="163" y="196" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Customer Secures:</text>
  <text x="163" y="212" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Users</text>
  <text x="163" y="228" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Data</text>
  <text x="163" y="244" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Applications</text>
  <text x="163" y="260" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Permissions</text>
</svg>
