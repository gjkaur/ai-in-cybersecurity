  <line x1="280" y1="216" x2="280" y2="228" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <line x1="280" y1="234" x2="280" y2="246" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="220" y="252" width="120" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="280" y="284" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0F172A">SSH</text>
