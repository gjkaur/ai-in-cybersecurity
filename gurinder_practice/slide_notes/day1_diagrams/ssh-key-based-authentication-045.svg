<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 376 484" role="img" aria-label="Visual Diagram for Whiteboard">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="376" height="484" fill="#F8FAFC"/>
  <text x="280" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Visual Diagram for Whiteboard</text>
  <rect x="220" y="60" width="120" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="280" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0F172A">Your Laptop</text>
