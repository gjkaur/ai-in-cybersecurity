<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 376 374" role="img" aria-label="Whiteboard Diagram">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="376" height="374" fill="#F8FAFC"/>
  <text x="280" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Diagram</text>
  <rect x="220" y="60" width="120" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="280" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0F172A">Internet</text>
  <line x1="280" y1="104" x2="280" y2="114" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="217" y="120" width="126" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="280" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0F172A">Security Group</text>
  <line x1="280" y1="164" x2="280" y2="174" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="198" y="180" width="165" height="154" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="280" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563EB">EC2</text>
  <text x="222" y="242" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Allow:</text>
  <text x="222" y="264" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• 22 (Admin IP)</text>
  <text x="222" y="286" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• 443 (Everyone)</text>
  <text x="222" y="308" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Deny:</text>
  <text x="222" y="330" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Everything Else</text>
</svg>
