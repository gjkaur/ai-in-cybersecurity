<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 135" width="144" height="135" role="img" aria-label="Whiteboard Diagram">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="144" height="135" fill="#F8FAFC"/>
  <text x="106" y="15" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#0F172A">Diagram</text>
  <rect x="83" y="22" width="46" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="33" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">Internet</text>
  <line x1="106" y1="39" x2="106" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="80" y="44" width="53" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">Security Group</text>
  <line x1="106" y1="61" x2="106" y2="60" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="72" y="66" width="68" height="55" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="106" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#2563EB">EC2</text>
  <text x="81" y="89" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Allow:</text>
  <text x="81" y="97" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• 22 (Admin IP)</text>
  <text x="81" y="105" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• 443 (Everyone)</text>
  <text x="81" y="113" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Deny:</text>
  <text x="81" y="121" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Everything Else</text>
</svg>
