  <rect x="77" y="78" width="59" height="23" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="89" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">Complete Account</text>
  <text x="106" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">Takeover</text>
