<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 170" width="144" height="170" role="img" aria-label="Whiteboard Diagram">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="144" height="170" fill="#F8FAFC"/>
  <text x="106" y="15" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#0F172A">Diagram</text>
  <rect x="68" y="22" width="77" height="55" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="106" y="32" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#2563EB">AWS Responsibility</text>
  <text x="77" y="45" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Physical Security</text>
  <text x="77" y="53" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Servers</text>
  <text x="77" y="61" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Storage Hardware</text>
  <text x="77" y="69" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Networking</text>
  <text x="77" y="77" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Hypervisor</text>
  <rect x="74" y="85" width="65" height="71" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="106" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#2563EB">Customer Responsibility</text>
  <text x="83" y="108" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Data</text>
  <text x="83" y="116" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Applications</text>
  <text x="83" y="124" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• OS</text>
  <text x="83" y="132" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• IAM</text>
  <text x="83" y="140" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Permissions</text>
  <text x="83" y="148" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Firewall Rules</text>
  <text x="83" y="156" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Encryption</text>
</svg>
