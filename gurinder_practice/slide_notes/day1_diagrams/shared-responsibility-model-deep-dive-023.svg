<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 284 346" width="220" height="268" role="img" aria-label="Whiteboard Diagram">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="284" height="346" fill="#F8FAFC"/>
  <text x="211" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Diagram</text>
  <rect x="144" y="44" width="135" height="112" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="211" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#2563EB">AWS Responsibility</text>
  <text x="161" y="90" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Physical Security</text>
  <text x="161" y="106" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Servers</text>
  <text x="161" y="122" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Storage Hardware</text>
  <text x="161" y="138" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Networking</text>
  <text x="161" y="154" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Hypervisor</text>
  <rect x="154" y="174" width="115" height="144" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="211" y="195" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#2563EB">Customer Responsibility</text>
  <text x="171" y="220" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Data</text>
  <text x="171" y="236" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Applications</text>
  <text x="171" y="252" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• OS</text>
  <text x="171" y="268" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• IAM</text>
  <text x="171" y="284" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Permissions</text>
  <text x="171" y="300" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Firewall Rules</text>
  <text x="171" y="316" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• Encryption</text>
</svg>
