  <text x="75" y="61" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── SNS Access</text>
  <text x="75" y="69" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├── IAM Access</text>
  <text x="75" y="77" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• └── EC2 Access</text>
