<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 376 476" role="img" aria-label="Whiteboard Diagram">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="376" height="476" fill="#F8FAFC"/>
  <text x="280" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Diagram</text>
  <rect x="187" y="60" width="186" height="154" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="280" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563EB">AWS Responsibility</text>
  <text x="211" y="122" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Physical Security</text>
  <text x="211" y="144" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Servers</text>
  <text x="211" y="166" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Storage Hardware</text>
  <text x="211" y="188" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Networking</text>
  <text x="211" y="210" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Hypervisor</text>
  <rect x="201" y="238" width="158" height="198" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="280" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563EB">Customer Responsibility</text>
  <text x="225" y="300" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Data</text>
  <text x="225" y="322" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Applications</text>
  <text x="225" y="344" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• OS</text>
  <text x="225" y="366" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• IAM</text>
  <text x="225" y="388" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Permissions</text>
  <text x="225" y="410" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Firewall Rules</text>
  <text x="225" y="432" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Encryption</text>
