<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 376 330" role="img" aria-label="Over-Permissioned Example">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="376" height="330" fill="#F8FAFC"/>
  <text x="280" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Over-Permissioned Example</text>
  <rect x="217" y="60" width="126" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="280" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0F172A">Developer Role</text>
  <line x1="280" y1="104" x2="280" y2="114" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="200" y="120" width="161" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="280" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0F172A">AdministratorAccess</text>
  <line x1="280" y1="164" x2="280" y2="174" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="177" y="180" width="207" height="110" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="280" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563EB">Can modify IAM</text>
  <text x="201" y="242" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Can delete S3 buckets</text>
  <text x="201" y="264" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Can terminate EC2 instances</text>
  <text x="201" y="286" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• Can disable logging</text>
</svg>
