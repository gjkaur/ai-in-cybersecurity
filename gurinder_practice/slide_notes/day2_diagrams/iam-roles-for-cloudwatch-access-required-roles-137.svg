<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 376 254" role="img" aria-label="Example Validation Checklist">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="376" height="254" fill="#F8FAFC"/>
  <text x="280" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Example Validation Checklist</text>
  <rect x="173" y="60" width="214" height="154" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="280" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563EB">□ Source IP identified</text>
  <text x="197" y="122" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• □ Number of attempts verified</text>
  <text x="197" y="144" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• □ Internal or external source?</text>
  <text x="197" y="166" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• □ Successful login observed?</text>
  <text x="197" y="188" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• □ Other hosts affected?</text>
  <text x="197" y="210" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• □ Escalation needed?</text>
</svg>
