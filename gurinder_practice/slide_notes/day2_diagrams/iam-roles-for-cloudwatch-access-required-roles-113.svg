  <rect x="74" y="72" width="65" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="83" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">Open Investigation</text>
  <line x1="106" y1="89" x2="106" y2="88" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="78" y="94" width="56" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">Review Evidence</text>
  <line x1="106" y1="111" x2="106" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
