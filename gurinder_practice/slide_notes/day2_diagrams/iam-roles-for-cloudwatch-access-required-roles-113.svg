<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 171" width="144" height="171" role="img" aria-label="Example SOC Workflow">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="144" height="171" fill="#F8FAFC"/>
  <text x="106" y="15" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#0F172A">Example SOC Workflow</text>
  <rect x="78" y="22" width="56" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="33" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">Dashboard Alert</text>
  <line x1="106" y1="39" x2="106" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="72" y="44" width="68" height="23" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
