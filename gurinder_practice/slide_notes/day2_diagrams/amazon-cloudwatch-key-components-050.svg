<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 376 292" role="img" aria-label="Why the CloudWatch Agent Exists">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="376" height="292" fill="#F8FAFC"/>
  <text x="280" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Why the CloudWatch Agent Exists</text>
  <rect x="220" y="60" width="120" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="280" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0F172A">EC2 Instance</text>
  <line x1="280" y1="104" x2="280" y2="114" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="184" y="120" width="193" height="132" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="280" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2563EB">├─ Application Logs</text>
  <text x="208" y="182" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• ├─ Auth Logs</text>
  <text x="208" y="204" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• ├─ System Logs</text>
  <text x="208" y="226" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• └─ Custom Metrics</text>
  <text x="208" y="248" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F172A">• CloudWatch ❌ Cannot See These</text>
</svg>
