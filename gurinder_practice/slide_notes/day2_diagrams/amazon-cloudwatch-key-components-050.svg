<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 105" width="144" height="105" role="img" aria-label="Why the CloudWatch Agent Exists">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="144" height="105" fill="#F8FAFC"/>
  <text x="106" y="15" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#0F172A">Why the CloudWatch Agent Exists</text>
  <rect x="83" y="22" width="47" height="17" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.8" filter="url(#sh)"/>
  <text x="106" y="33" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="4" font-weight="600" fill="#0F172A">EC2 Instance</text>
  <line x1="106" y1="39" x2="106" y2="38" stroke="#475569" stroke-width="2" marker-end="url(#m-slate)"/>
  <rect x="66" y="44" width="80" height="47" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="106" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#2563EB">├─ Application Logs</text>
  <text x="75" y="67" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├─ Auth Logs</text>
  <text x="75" y="75" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• ├─ System Logs</text>
  <text x="75" y="83" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• └─ Custom Metrics</text>
  <text x="75" y="91" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• CloudWatch ❌ Cannot See These</text>
</svg>
