<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 75" width="144" height="75" role="img" aria-label="Why IAM Matters for CloudWatch">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="144" height="75" fill="#F8FAFC"/>
  <text x="106" y="15" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#0F172A">Why IAM Matters for CloudWatch</text>
  <rect x="66" y="22" width="80" height="39" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="106" y="32" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700" fill="#2563EB">CloudWatch Agent → Cannot send logs</text>
  <text x="75" y="45" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• CloudWatch → Cannot access resources</text>
  <text x="75" y="53" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• AI Operations → Cannot investigate data</text>
  <text x="75" y="61" font-family="Arial, Helvetica, sans-serif" font-size="4" fill="#0F172A">• Analysts → Cannot view results</text>
</svg>
