<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 284 152" width="284" height="152" role="img" aria-label="Why IAM Matters for CloudWatch">
  <defs>
    <filter id="sh" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="m-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2 L9 5 L1 8" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="284" height="152" fill="#F8FAFC"/>
  <text x="211" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Why IAM Matters for CloudWatch</text>
  <rect x="141" y="44" width="140" height="80" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#sh)"/>
  <text x="211" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#2563EB">CloudWatch Agent → Cannot send logs</text>
  <text x="158" y="90" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0F172A">• CloudWatch → Cannot access resources</text>
