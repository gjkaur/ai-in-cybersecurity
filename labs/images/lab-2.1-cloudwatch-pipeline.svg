<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" role="img" aria-label="Lab 2.1 CloudWatch pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="920" height="340" rx="12" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">Lab 2.1 - CloudWatch Log Streaming and AI Investigation</text>

  <rect x="30" y="80" width="150" height="90" rx="8" fill="#065f46" stroke="#34d399"/>
  <text x="105" y="110" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">EC2 + IAM Role</text>
  <text x="105" y="130" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="11">audit.log</text>
  <text x="105" y="146" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="11">nginx access.log</text>

  <rect x="210" y="80" width="150" height="90" rx="8" fill="#115e59" stroke="#2dd4bf"/>
  <text x="285" y="115" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">CloudWatch Agent</text>
  <text x="285" y="135" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="11">ships logs to groups</text>

  <rect x="390" y="80" width="150" height="90" rx="8" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="465" y="110" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">Log Groups</text>
  <text x="465" y="130" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="11">/soc-lab/audit</text>
  <text x="465" y="146" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="11">/soc-lab/nginx</text>

  <rect x="570" y="80" width="150" height="90" rx="8" fill="#312e81" stroke="#a78bfa"/>
  <text x="645" y="115" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">Log Analytics AI</text>
  <text x="645" y="135" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="11">natural language queries</text>

  <rect x="750" y="80" width="150" height="90" rx="8" fill="#581c87" stroke="#c084fc"/>
  <text x="825" y="115" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">AI Operations</text>
  <text x="825" y="135" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">investigations</text>

  <line x1="180" y1="125" x2="210" y2="125" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="125" x2="390" y2="125" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="125" x2="570" y2="125" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="125" x2="750" y2="125" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="220" width="760" height="90" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="460" y="250" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600">Same Lab 1.2 evidence, now in CloudWatch with AI triage</text>
  <text x="460" y="278" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">SSH failures | sudoers CREATE | nginx 404 scans | hypotheses | close with reason</text>
</svg>
