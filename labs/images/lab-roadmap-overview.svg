<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="Six lab course roadmap">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="12" fill="url(#bg)"/>
  <text x="480" y="34" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20" font-weight="700">SOC Lab Roadmap - Six Labs</text>
  <text x="480" y="58" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">Complete in order | us-west-2</text>

  <rect x="30" y="85" width="900" height="110" rx="10" fill="#1e3a8a" stroke="#60a5fa" stroke-opacity="0.5"/>
  <text x="50" y="110" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="14" font-weight="700">Day 1 - Environment + Attack + Cloud Detection</text>

  <rect x="50" y="125" width="250" height="55" rx="8" fill="#1d4ed8" stroke="#93c5fd"/>
  <text x="175" y="148" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">1.1 Instance Setup</text>
  <text x="175" y="166" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif" font-size="10">EC2 | SSH | nginx</text>

  <rect x="330" y="125" width="250" height="55" rx="8" fill="#991b1b" stroke="#fca5a5"/>
  <text x="455" y="148" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">1.2 Suspicious Activity</text>
  <text x="455" y="166" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="10">attacks | auditd | Bedrock</text>

  <rect x="610" y="125" width="250" height="55" rx="8" fill="#581c87" stroke="#c084fc"/>
  <text x="735" y="148" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">1.3 GuardDuty + Security Hub</text>
  <text x="735" y="166" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="10">ML findings | S3 loop</text>

  <rect x="30" y="220" width="900" height="110" rx="10" fill="#134e4a" stroke="#2dd4bf" stroke-opacity="0.5"/>
  <text x="50" y="245" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="14" font-weight="700">Day 2 - Centralized Detection + Automation</text>

  <rect x="50" y="260" width="250" height="55" rx="8" fill="#065f46" stroke="#34d399"/>
  <text x="175" y="283" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">2.1 CloudWatch Streaming</text>
  <text x="175" y="301" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="10">agent | Log Analytics | AI Ops</text>

  <rect x="330" y="260" width="250" height="55" rx="8" fill="#312e81" stroke="#a78bfa"/>
  <text x="455" y="283" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">2.2 Dashboard + Alarms</text>
  <text x="455" y="301" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="10">metrics | auto-investigation</text>

  <rect x="610" y="260" width="250" height="55" rx="8" fill="#78350f" stroke="#fbbf24"/>
  <text x="735" y="283" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">2.3 Capstone</text>
  <text x="735" y="301" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="10">build | attack | detect | report</text>

  <line x1="300" y1="152" x2="330" y2="152" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="152" x2="610" y2="152" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="735" y1="180" x2="735" y2="210" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="287" x2="330" y2="287" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="287" x2="610" y2="287" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="355" width="800" height="50" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="480" y="385" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">1.1 build host -&gt; 1.2 attack + triage -&gt; 1.3 cloud ML -&gt; 2.1 stream logs -&gt; 2.2 detect + alarm -&gt; 2.3 own full loop</text>
</svg>
