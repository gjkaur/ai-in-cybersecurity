<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" role="img" aria-label="Lab 1.3 GuardDuty and Security Hub flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="920" height="380" rx="12" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">Lab 1.3 - AWS AI-Powered Detection</text>
  <text x="460" y="56" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">GuardDuty | Security Hub | S3 defender loop</text>

  <rect x="40" y="85" width="170" height="70" rx="8" fill="#065f46" stroke="#34d399"/>
  <text x="125" y="115" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">Lab 1.2 Activity</text>
  <text x="125" y="135" text-anchor="middle" fill="#d1fae5" font-family="Arial, sans-serif" font-size="11">SSH brute force | open SG</text>

  <rect x="250" y="75" width="190" height="90" rx="8" fill="#7f1d1d" stroke="#f87171"/>
  <text x="345" y="105" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">Amazon GuardDuty</text>
  <text x="345" y="125" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="11">ML on CloudTrail</text>
  <text x="345" y="141" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="11">VPC Flow Logs | DNS</text>

  <rect x="480" y="75" width="190" height="90" rx="8" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="575" y="105" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">AWS Security Hub</text>
  <text x="575" y="125" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="11">CIS + FSBP standards</text>
  <text x="575" y="141" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="11">MITRE ATT&amp;CK mapping</text>

  <rect x="710" y="85" width="170" height="70" rx="8" fill="#78350f" stroke="#fbbf24"/>
  <text x="795" y="115" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="600">Findings</text>
  <text x="795" y="135" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="11">SSHBruteForce | S3.1</text>

  <line x1="210" y1="120" x2="250" y2="120" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="120" x2="480" y2="120" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="120" x2="710" y2="120" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="120" y="210" width="680" height="130" rx="8" fill="#0f172a" stroke="#64748b"/>
  <text x="460" y="238" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600">Part 4 - S3 misconfiguration loop</text>
  <text x="160" y="268" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">1. Create bucket, disable public access block</text>
  <text x="160" y="290" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">2. Security Hub flags FSBP S3.1 (15-30 min)</text>
  <text x="160" y="312" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">3. Re-enable block, finding becomes RESOLVED</text>
  <text x="520" y="268" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12">Enable services first,</text>
  <text x="520" y="290" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12">do S3 while waiting for</text>
  <text x="520" y="312" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12">GuardDuty findings (10-30 min)</text>
</svg>
