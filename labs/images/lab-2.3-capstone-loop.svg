<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" role="img" aria-label="Lab 2.3 capstone loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#450a0a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fb7185"/>
    </marker>
  </defs>
  <rect width="920" height="380" rx="12" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">Lab 2.3 - Attack and Detect Capstone</text>
  <text x="460" y="56" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">Build | Attack | Detect | Triage | Document</text>

  <rect x="40" y="90" width="130" height="70" rx="8" fill="#312e81" stroke="#a78bfa"/>
  <text x="105" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">Choose Threat</text>
  <text x="105" y="140" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="11">A-E menu</text>

  <rect x="190" y="90" width="130" height="70" rx="8" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="255" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">Build Pipeline</text>
  <text x="255" y="140" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="11">filter | alarm | widget</text>

  <rect x="340" y="90" width="130" height="70" rx="8" fill="#991b1b" stroke="#f87171"/>
  <text x="405" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">Simulate Attack</text>
  <text x="405" y="140" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="11">testattacker user</text>

  <rect x="490" y="90" width="130" height="70" rx="8" fill="#78350f" stroke="#fbbf24"/>
  <text x="555" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">Verify Fired</text>
  <text x="555" y="140" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="11">log | metric | alarm</text>

  <rect x="640" y="90" width="130" height="70" rx="8" fill="#581c87" stroke="#c084fc"/>
  <text x="705" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">AI Investigation</text>
  <text x="705" y="140" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">evaluate hypotheses</text>

  <rect x="790" y="90" width="100" height="70" rx="8" fill="#065f46" stroke="#4ade80"/>
  <text x="840" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">Close</text>
  <text x="840" y="140" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="11">incident report</text>

  <line x1="170" y1="125" x2="190" y2="125" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="125" x2="340" y2="125" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="125" x2="490" y2="125" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="125" x2="640" y2="125" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="770" y1="125" x2="790" y2="125" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="210" width="760" height="140" rx="8" fill="#0f172a" stroke="#64748b"/>
  <text x="460" y="238" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600">Threat menu (pick one)</text>
  <text x="120" y="264" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">A SSH brute force (T1110)</text>
  <text x="120" y="282" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">B New account (T1136)</text>
  <text x="120" y="300" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">C Shadow access (T1003)</text>
  <text x="120" y="318" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">D su abuse (T1548)</text>
  <text x="120" y="336" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">E Cron persistence (T1053)</text>
  <text x="480" y="264" fill="#fb7185" font-family="Arial, sans-serif" font-size="12">End-to-end: no manual alarm trigger</text>
  <text x="480" y="290" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">auditd to /soc-lab/audit to CloudWatch</text>
  <text x="480" y="312" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">to metric to alarm to AI Ops to report</text>
</svg>
