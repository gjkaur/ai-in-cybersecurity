<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" role="img" aria-label="Three AI layers in the SOC pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c084fc"/>
    </marker>
  </defs>
  <rect width="820" height="380" rx="12" fill="url(#bg)"/>
  <text x="410" y="34" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">AI in the Pipeline - Three Layers</text>

  <rect x="40" y="70" width="740" height="80" rx="8" fill="#581c87" stroke="#c084fc"/>
  <text x="60" y="98" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="600">Layer 1 - Direct Triage (Lab 1.2)</text>
  <text x="60" y="120" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="12">Raw logs on EC2 -&gt; Bedrock API -&gt; SOC analysis in terminal</text>
  <text x="60" y="138" fill="#d8b4fe" font-family="Arial, sans-serif" font-size="11">Question: What does this log data mean right now?</text>

  <rect x="40" y="165" width="740" height="80" rx="8" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="60" y="193" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="600">Layer 2 - Cloud ML (Lab 1.3)</text>
  <text x="60" y="215" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="12">AWS telemetry -&gt; GuardDuty / Security Hub -&gt; ATT&amp;CK-mapped findings</text>
  <text x="60" y="233" fill="#93c5fd" font-family="Arial, sans-serif" font-size="11">Question: What is AWS detecting that I did not query for?</text>

  <rect x="40" y="260" width="740" height="95" rx="8" fill="#065f46" stroke="#34d399"/>
  <text x="60" y="288" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="600">Layer 3 - Operational AI (Labs 2.1-2.3)</text>
  <text x="60" y="310" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="12">CloudWatch logs -&gt; Log Analytics AI (queries) -&gt; AI Operations (alarm investigations)</text>
  <text x="60" y="328" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="12">Analyst evaluates hypotheses and closes with documented reason</text>
  <text x="60" y="346" fill="#86efac" font-family="Arial, sans-serif" font-size="11">Question: Can detection and triage run automatically when something bad happens?</text>

  <line x1="410" y1="150" x2="410" y2="165" stroke="#c084fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="245" x2="410" y2="260" stroke="#c084fc" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
