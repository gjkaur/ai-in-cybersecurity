<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="S3 defender loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="720" height="280" rx="12" fill="url(#bg)"/>
  <text x="360" y="32" text-anchor="middle" fill="#fafaf9" font-family="Arial, sans-serif" font-size="16" font-weight="700">S3 Misconfiguration Defender Loop</text>

  <rect x="30" y="70" width="120" height="60" rx="8" fill="#991b1b" stroke="#f87171"/>
  <text x="90" y="95" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="600">Misconfigure</text>
  <text x="90" y="112" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="10">public block OFF</text>

  <rect x="180" y="70" width="120" height="60" rx="8" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="240" y="95" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="600">Detect</text>
  <text x="240" y="112" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="10">Security Hub S3.1</text>

  <rect x="330" y="70" width="120" height="60" rx="8" fill="#065f46" stroke="#4ade80"/>
  <text x="390" y="95" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="600">Remediate</text>
  <text x="390" y="112" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="10">block ON</text>

  <rect x="480" y="70" width="120" height="60" rx="8" fill="#312e81" stroke="#a78bfa"/>
  <text x="540" y="95" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="600">Verify</text>
  <text x="540" y="112" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="10">RESOLVED</text>

  <rect x="570" y="170" width="120" height="60" rx="8" fill="#78350f" stroke="#fbbf24"/>
  <text x="630" y="195" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="600">15-30 min</text>
  <text x="630" y="212" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="10">typical delay</text>

  <line x1="150" y1="100" x2="180" y2="100" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="100" x2="330" y2="100" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="100" x2="480" y2="100" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
