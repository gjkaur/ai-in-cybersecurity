<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-label="Lab 2.2 detection pipeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>
  <rect width="920" height="360" rx="12" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="700">Lab 2.2 - Automated Detection Pipeline</text>

  <rect x="40" y="70" width="140" height="80" rx="8" fill="#065f46" stroke="#4ade80"/>
  <text x="110" y="100" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">Log Groups</text>
  <text x="110" y="120" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="11">/soc-lab/nginx</text>
  <text x="110" y="136" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="11">/soc-lab/audit</text>

  <rect x="210" y="70" width="140" height="80" rx="8" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="280" y="100" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">Metric Filters</text>
  <text x="280" y="120" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="11">WebScanAttempts</text>
  <text x="280" y="136" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="11">SudoersModified</text>

  <rect x="380" y="70" width="120" height="80" rx="8" fill="#78350f" stroke="#fbbf24"/>
  <text x="440" y="105" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">SOCLab Metrics</text>
  <text x="440" y="125" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="11">custom counters</text>

  <rect x="530" y="70" width="120" height="80" rx="8" fill="#991b1b" stroke="#f87171"/>
  <text x="590" y="100" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">Alarms</text>
  <text x="590" y="120" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="11">web-scan-alarm</text>
  <text x="590" y="136" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="11">sudoers-alarm</text>

  <rect x="680" y="70" width="200" height="80" rx="8" fill="#581c87" stroke="#c084fc"/>
  <text x="780" y="100" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="600">AI Operations</text>
  <text x="780" y="120" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">auto investigation</text>
  <text x="780" y="136" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">+ dashboard widgets</text>

  <line x1="180" y1="110" x2="210" y2="110" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="110" x2="380" y2="110" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="110" x2="530" y2="110" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="110" x2="680" y2="110" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="190" width="760" height="140" rx="8" fill="#0f172a" stroke="#64748b"/>
  <text x="460" y="218" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="600">Two detection paths from Lab 1.2</text>
  <text x="140" y="248" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Web recon (T1190): nginx 404 burst, metric &gt;= 3, alarm</text>
  <text x="140" y="270" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Privilege persistence (T1548): sudoers CREATE, threshold 1</text>
  <text x="140" y="292" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Dashboard: soc-lab-web-monitor (7+ widgets)</text>
  <text x="140" y="314" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">No manual trigger - alarm fires investigation automatically</text>
</svg>
